<!-- wp:template-part {"slug":"header","tagName":"header"} /-->

<!-- wp:html -->
<div class="landing-2000s-wrapper">
	<div class="window landing-2000s-window single-post-window">
		<!-- Title bar -->
		<div class="title-bar">
			<div class="title-bar-text">
				<img src="" data-icon="word.png" alt="" width="16" height="16" style="vertical-align: middle; margin-right: 4px;">
				<span class="post-title-inline"><!-- wp:post-title {"level":0,"isLink":false} /--></span> - Microsoft Word
			</div>
			<div class="title-bar-controls">
				<button aria-label="Minimize" class="window-minimize">
					<span class="window-control-icon" aria-hidden="true">_</span>
				</button>
				<button aria-label="Maximize" class="window-maximize">
					<span class="window-control-icon" aria-hidden="true">□</span>
				</button>
				<button aria-label="Close" class="window-close">
					<span class="window-control-icon" aria-hidden="true">×</span>
				</button>
			</div>
		</div>

		<!-- Menu bar -->
		<div class="window-menu-bar">
			<div class="menu-item">File</div>
			<div class="menu-item">Edit</div>
			<div class="menu-item">View</div>
			<div class="menu-item">Insert</div>
			<div class="menu-item">Format</div>
			<div class="menu-item">Tools</div>
			<div class="menu-item">Table</div>
			<div class="menu-item">Window</div>
			<div class="menu-item">Help</div>
		</div>

		<!-- Toolbar - Standard -->
		<div class="win98-toolbar">
			<div class="win98-toolbar-row">
				<button class="win98-toolbar-btn win98-edit-btn" title="Edit Document" data-word-action="toggleEdit">
					<img src="" data-icon="write_wordpad-0.png" alt="Edit" width="16" height="16">
				</button>
				<span class="win98-toolbar-separator"></span>
				<button class="win98-toolbar-btn" title="New Blank Document">
					<img src="" data-icon="notepad_file-0.png" alt="New" width="16" height="16">
				</button>
				<button class="win98-toolbar-btn" title="Open">
					<img src="" data-icon="directory_open_cool-0.png" alt="Open" width="16" height="16">
				</button>
				<button class="win98-toolbar-btn" title="Save">
					<img src="" data-icon="floppy_drive_3_5-0.png" alt="Save" width="16" height="16">
				</button>
				<span class="win98-toolbar-separator"></span>
				<button class="win98-toolbar-btn" title="Print">
					<img src="" data-icon="printer-0.png" alt="Print" width="16" height="16">
				</button>
				<button class="win98-toolbar-btn" title="Print Preview">
					<img src="" data-icon="magnifying_glass-0.png" alt="Preview" width="16" height="16">
				</button>
				<button class="win98-toolbar-btn" title="Spelling and Grammar">
					<img src="" data-icon="accesibility_window_abc.png" alt="Spelling" width="16" height="16">
				</button>
				<span class="win98-toolbar-separator"></span>
				<button class="win98-toolbar-btn" title="Cut">
					<img src="" data-icon="write_red.png" alt="Cut" width="16" height="16">
				</button>
				<button class="win98-toolbar-btn" title="Copy">
					<img src="" data-icon="diskettes_copy-0.png" alt="Copy" width="16" height="16">
				</button>
				<button class="win98-toolbar-btn" title="Paste">
					<img src="" data-icon="write_yellow-0.png" alt="Paste" width="16" height="16">
				</button>
				<span class="win98-toolbar-separator"></span>
				<button class="win98-toolbar-btn" title="Undo" data-word-action="undo">&#8630;</button>
				<button class="win98-toolbar-btn" title="Redo" data-word-action="redo">&#8631;</button>
				<span class="win98-toolbar-separator"></span>
				<button class="win98-toolbar-btn" title="Insert Hyperlink">
					<img src="" data-icon="connected_world-0.png" alt="Hyperlink" width="16" height="16">
				</button>
				<button class="win98-toolbar-btn" title="Tables and Borders">
					<img src="" data-icon="charmap-0.png" alt="Tables" width="16" height="16">
				</button>
				<span class="win98-toolbar-separator"></span>
				<button class="win98-toolbar-btn" title="Show/Hide &para;" data-word-action="pilcrow">&#182;</button>
				<select class="win98-zoom-select" disabled>
					<option>100%</option>
				</select>
			</div>
			<!-- Toolbar - Formatting -->
			<div class="win98-toolbar-row">
				<select class="win98-style-select" disabled>
					<option>Normal</option>
				</select>
				<select class="win98-font-select" disabled>
					<option>Times New Roman</option>
				</select>
				<select class="win98-size-select" disabled>
					<option>12</option>
				</select>
				<span class="win98-toolbar-separator"></span>
				<button class="win98-toolbar-btn win98-fmt-btn" title="Bold" data-word-action="bold"><b>B</b></button>
				<button class="win98-toolbar-btn win98-fmt-btn" title="Italic" data-word-action="italic"><i>I</i></button>
				<button class="win98-toolbar-btn win98-fmt-btn" title="Underline" data-word-action="underline"><u>U</u></button>
				<span class="win98-toolbar-separator"></span>
				<button class="win98-toolbar-btn win98-fmt-btn win98-align-btn" title="Align Left" data-word-action="justifyLeft">
					<span class="win98-align-icon win98-align-left"></span>
				</button>
				<button class="win98-toolbar-btn win98-fmt-btn win98-align-btn" title="Center" data-word-action="justifyCenter">
					<span class="win98-align-icon win98-align-center"></span>
				</button>
				<button class="win98-toolbar-btn win98-fmt-btn win98-align-btn" title="Align Right" data-word-action="justifyRight">
					<span class="win98-align-icon win98-align-right"></span>
				</button>
				<button class="win98-toolbar-btn win98-fmt-btn win98-align-btn" title="Justify" data-word-action="justifyFull">
					<span class="win98-align-icon win98-align-justify"></span>
				</button>
				<span class="win98-toolbar-separator"></span>
				<button class="win98-toolbar-btn win98-fmt-btn" title="Numbering" data-word-action="insertOrderedList">
					<span class="win98-list-icon win98-list-numbered"></span>
				</button>
				<button class="win98-toolbar-btn win98-fmt-btn" title="Bullets" data-word-action="insertUnorderedList">
					<span class="win98-list-icon win98-list-bullet"></span>
				</button>
				<span class="win98-toolbar-separator"></span>
				<button class="win98-toolbar-btn win98-fmt-btn" title="Decrease Indent" data-word-action="outdent">&#8676;</button>
				<button class="win98-toolbar-btn win98-fmt-btn" title="Increase Indent" data-word-action="indent">&#8677;</button>
				<span class="win98-toolbar-separator"></span>
				<button class="win98-toolbar-btn win98-fmt-btn" title="Highlight" style="border-bottom: 2px solid #FFFF00;">A</button>
				<button class="win98-toolbar-btn win98-fmt-btn" title="Font Color" style="border-bottom: 2px solid #FF0000;"><b>A</b></button>
			</div>
		</div>

		<!-- Ruler -->
		<div class="win98-ruler">
			<div class="win98-ruler-marks">
				<span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span>
			</div>
		</div>

		<!-- Document area -->
		<div class="window-body single-post-body">
			<div class="single-post-document-area">
				<div class="single-post-page" spellcheck="false">
					<!-- Post Header -->
					<div class="single-post-doc-header">
						<!-- wp:post-title {"level":1} /-->
						<div class="single-post-doc-meta">
							<!-- wp:post-date /-->
							<span class="single-post-meta-sep">|</span>
							<!-- wp:post-author /-->
						</div>
						<hr class="single-post-hr">
					</div>

					<!-- Post Content -->
					<div class="single-post-doc-content post-content">
						<!-- wp:post-content {"layout":{"type":"constrained"}} /-->
					</div>

					<!-- Post Meta / Tags -->
					<div class="single-post-doc-footer">
						<hr class="single-post-hr">
						<div class="single-post-tags">
							<!-- wp:post-terms {"term":"category"} /-->
							<!-- wp:post-terms {"term":"post_tag"} /-->
						</div>
						<div class="single-post-nav">
							<!-- wp:post-navigation-link {"type":"previous","label":"&larr; Previous Post"} /-->
							<!-- wp:post-navigation-link {"type":"next","label":"Next Post &rarr;"} /-->
						</div>
					</div>
				</div>
			</div>
		</div>

		<!-- Status bar - matches Word 97 layout -->
		<div class="status-bar single-post-statusbar">
			<p class="status-bar-field">Page 1</p>
			<p class="status-bar-field">Sec 1</p>
			<p class="status-bar-field">1/1</p>
			<p class="status-bar-field"><!-- wp:post-date /--></p>
			<p class="status-bar-field">Ln 1 &nbsp; Col 1</p>
			<p class="status-bar-field win98-statusbar-indicator">REC</p>
			<p class="status-bar-field win98-statusbar-indicator">TRK</p>
			<p class="status-bar-field win98-statusbar-indicator">EXT</p>
			<p class="status-bar-field win98-statusbar-indicator">OVR</p>
			<p class="status-bar-field win98-statusbar-indicator">WPH</p>
		</div>
	</div>
</div>
<!-- /wp:html -->
