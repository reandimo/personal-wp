<div class="landing-2000s-wrapper">
	<div class="window landing-2000s-window explorer-window">
		<!-- Title bar -->
		<div class="title-bar">
			<div class="title-bar-text">
				<img src="" data-icon="directory_explorer-0.png" alt="" width="16" height="16" style="vertical-align: middle; margin-right: 4px;">
				C:\My Documents\Blog
			</div>
			<div class="title-bar-controls">
				<button aria-label="Minimize" class="window-minimize">
					<span class="window-control-icon" aria-hidden="true">_</span>
				</button>
				<button aria-label="Maximize" class="window-maximize">
					<span class="window-control-icon" aria-hidden="true">□</span>
				</button>
				<button aria-label="Close" class="window-close">
					<span class="window-control-icon" aria-hidden="true">×</span>
				</button>
			</div>
		</div>

		<!-- Menu bar -->
		<div class="window-menu-bar">

			<div class="menu-item">Help</div>

		<!-- Toolbar -->
		<div class="explorer-toolbar">
			<button class="explorer-toolbar-btn" title="Back" disabled>
				<img src="" data-icon="directory_closed-0.png" alt="" width="16" height="16">
				<span>Back</span>
			</button>
			<button class="explorer-toolbar-btn" title="Forward" disabled>
				<img src="" data-icon="directory_open_cool-0.png" alt="" width="16" height="16">
				<span>Forward</span>
			</button>
			<button class="explorer-toolbar-btn" title="Up">
				<img src="" data-icon="directory_e_open-0.png" alt="" width="16" height="16">
				<span>Up</span>
			</button>
			<div class="explorer-toolbar-divider"></div>
			<button class="explorer-toolbar-btn" title="Search">
				<img src="" data-icon="computer_search-0.png" alt="" width="16" height="16">
				<span>Search</span>
			</button>
			<button class="explorer-toolbar-btn" title="Folders">

				<span>Folders</span>
			</button>
		</div>

			<label class="explorer-address-label">Address</label>
			<div class="explorer-address-input">
				<img src="" data-icon="directory_open_cool-0.png" alt="" width="16" height="16">
				<span>C:\My Documents\Blog</span>
			</div>
		</div>

		<!-- Main content area with panels -->
		<div class="window-body explorer-body">
			<!-- Tree panel (sidebar) - uses 98.css tree-view -->
			<div class="explorer-tree-panel">
				<ul class="tree-view">
					<li>
						<img src="" data-icon="desktop-0.png" alt="" width="16" height="16" style="vertical-align: middle; margin-right: 2px;">
						Desktop
						<ul>
							<li>
								<details open>
									<summary>
										<img src="" data-icon="computer-0.png" alt="" width="16" height="16" style="vertical-align: middle; margin-right: 2px;">
										My Computer
									</summary>
									<ul>
										<li>
											<details open>
												<summary>
													<img src="" data-icon="hard_disk_drive-0.png" alt="" width="16" height="16" style="vertical-align: middle; margin-right: 2px;">
													(C:)
												</summary>
												<ul>
													<li>
														<details open>
															<summary>
																<img src="" data-icon="directory_open_cool-0.png" alt="" width="16" height="16" style="vertical-align: middle; margin-right: 2px;">
																My Documents
															</summary>
															<ul>
																<li class="explorer-tree-active">
																	<img src="" data-icon="directory_open_cool-0.png" alt="" width="16" height="16" style="vertical-align: middle; margin-right: 2px;">
																	Blog
																</li>
															</ul>
														</details>
													</li>
												</ul>
											</details>
										</li>
									</ul>
								</details>
							</li>
						</ul>
					</li>
				</ul>
			</div>

			<!-- File list panel -->
			<div class="explorer-file-panel">
				<!-- Column headers -->
				<div class="explorer-list-header">
					<button class="explorer-col explorer-col-name">Name</button>
					<button class="explorer-col explorer-col-size">Size</button>
					<button class="explorer-col explorer-col-type">Type</button>
					<button class="explorer-col explorer-col-modified">Modified</button>
				</div>

				<!-- File list -->
				<div class="explorer-file-list">

						<!-- /wp:query-no-results -->

		<!-- Status bar -->
		<div class="status-bar">
			<p class="status-bar-field explorer-status-objects">object(s)</p>
			<p class="status-bar-field">My Computer</p>

</div>
