<!-- wp:html -->
<!-- Windows 98 style start bar -->
<header class="win98-header">
<div class="win98-taskbar">
	<button class="start-button" id="start-button" aria-label="Start" aria-expanded="false">
		<span class="start-button-icon">
			<img src="" data-icon="windows_slanted-0.png" alt="" width="16" height="16">
		</span>
		<span class="start-button-text">Start</span>
	</button>
	<div class="taskbar-tray">
		<div class="taskbar-clock" id="taskbar-clock">00:00</div>
	</div>
</div>

<!-- Start menu -->
<div class="start-menu" id="start-menu" aria-hidden="true">
	<div class="start-menu-sidebar">
		<span class="start-menu-sidebar-text">Windows<span class="sidebar-bold">98</span></span>
	</div>
	<div class="start-menu-main">
		<div class="start-menu-content">
			<div class="start-menu-section">
				<div class="start-menu-item" data-action="home">
					<span class="start-menu-icon">
						<img src="" data-icon="computer-3.png" alt="" width="32" height="32">
					</span>
					<span class="start-menu-label">Home</span>
				</div>
				<div class="start-menu-item has-submenu" data-action="portfolio">
					<span class="start-menu-icon">
						<img src="" data-icon="briefcase-0.png" alt="" width="32" height="32">
					</span>
					<span class="start-menu-label">Portfolio</span>
					<span class="submenu-arrow">&#9654;</span>
				</div>
				<div class="start-menu-item has-submenu" data-action="blog">
					<span class="start-menu-icon">
						<img src="" data-icon="directory_closed-0.png" alt="" width="32" height="32">
					</span>
					<span class="start-menu-label">Blog</span>
					<span class="submenu-arrow">&#9654;</span>
				</div>
				<div class="start-menu-item has-submenu" data-action="contact">
					<span class="start-menu-icon">
						<img src="" data-icon="address_book-0.png" alt="" width="32" height="32">
					</span>
					<span class="start-menu-label">Contact</span>
					<span class="submenu-arrow">&#9654;</span>
				</div>
			</div>
			<div class="start-menu-divider"></div>
			<div class="start-menu-section">
				<div class="start-menu-item" data-action="github">
					<span class="start-menu-icon">
						<img src="" data-icon="network-0.png" alt="" width="32" height="32">
					</span>
					<span class="start-menu-label">GitHub</span>
				</div>
				<div class="start-menu-item" data-action="linkedin">
					<span class="start-menu-icon">
						<img src="" data-icon="network-0.png" alt="" width="32" height="32">
					</span>
					<span class="start-menu-label">LinkedIn</span>
				</div>
				<div class="start-menu-item" data-action="email">
					<span class="start-menu-icon">
						<img src="" data-icon="mailbox_world-0.png" alt="" width="32" height="32">
					</span>
					<span class="start-menu-label">Email</span>
				</div>
			</div>
			<div class="start-menu-divider"></div>
			<div class="start-menu-section">
				<div class="start-menu-item" data-action="find">
					<span class="start-menu-icon">
						<img src="" data-icon="computer_search-0.png" alt="" width="32" height="32">
					</span>
					<span class="start-menu-label">Find...</span>
				</div>
				<div class="start-menu-item" data-action="help">
					<span class="start-menu-icon">
						<img src="" data-icon="help_book_big-0.png" alt="" width="32" height="32">
					</span>
					<span class="start-menu-label">Help</span>
				</div>
			</div>
			<div class="start-menu-divider"></div>
			<div class="start-menu-section">
				<div class="start-menu-item" data-action="shutdown">
					<span class="start-menu-icon">
						<img src="" data-icon="shut_down_normal-0.png" alt="" width="32" height="32">
					</span>
					<span class="start-menu-label">Shut Down...</span>
				</div>
			</div>
		</div>
	</div>
</div>
</header>
<!-- /wp:html -->
